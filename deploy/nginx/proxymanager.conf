# ProxyManager Control Plane Configuration
# Domain: proxy.ovncr.vn

upstream pm_dashboard {
    server 127.0.0.1:8000;
}

upstream pm_grpc {
    server 127.0.0.1:50051;
}

server {
    listen 80;
    server_name proxy.ovncr.vn;

    # gRPC for Agents (Theo mẫu)
    location /api.AgentService/ {
        grpc_pass grpc://pm_grpc;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        grpc_read_timeout 1h;
        grpc_send_timeout 1h;
    }

    # WebSocket for Dashboard (Theo mẫu)
    location /api/v1/ws {
        proxy_pass http://pm_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 1h;
    }

    # Dashboard Static & API (Theo mẫu)
    location / {
        proxy_pass http://pm_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# FRP HTTP Wildcard Proxy
server {
    listen 80;
    server_name *.v1.ovncr.vn;

    location / {
        proxy_pass http://127.0.0.1:18081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
