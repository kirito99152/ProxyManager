# ProxyManager Control Plane Configuration
# Domain: frpcontrol.c500.net

upstream pm_dashboard {
    server 127.0.0.1:8000;
}

upstream pm_grpc {
    server 127.0.0.1:50051;
}

server {
    listen 80;
    server_name frpcontrol.c500.net;

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name frpcontrol.c500.net;

    # SSL Configuration (Update these paths after running Certbot)
    # ssl_certificate /etc/letsencrypt/live/frpcontrol.c500.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/frpcontrol.c500.net/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ProxyManager gRPC Traffic (For Agents)
    # gRPC calls start with the package name from proto file (e.g., api.AgentService)
    location /api.AgentService/ {
        grpc_pass grpc://pm_grpc;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Increase timeouts for long-running streams (CommandStream)
        grpc_read_timeout 1h;
        grpc_send_timeout 1h;
    }

    # ProxyManager WebSocket (Dashboard Real-time)
    location /api/v1/ws {
        proxy_pass http://pm_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 1h;
    }

    # ProxyManager REST API & Dashboard Static Files
    location / {
        proxy_pass http://pm_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard timeouts
        proxy_read_timeout 90;
        proxy_send_timeout 90;
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
}
