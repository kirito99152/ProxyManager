server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cấu hình cho FRP Dashboard (nếu cần)
    location /frp/ {
        proxy_pass http://frps:7500/;
        proxy_set_header Host $host;
    }
}

# Cấu hình proxy cho các service được expose qua FRP
# Ở đây ta giả định FRPS chạy ở port 80/443 của container frps
# Nhưng thực tế Nginx sẽ hứng port 80/443 của HOST

server {
    listen 8080;
    server_name *.yourdomain.com;

    location / {
        proxy_pass http://frps:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
