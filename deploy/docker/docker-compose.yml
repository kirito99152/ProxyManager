version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: proxymanager-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: proxymanager
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../internal/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - db-net

  server:
    build:
      context: ../../
      dockerfile: deploy/docker/server/Dockerfile
    container_name: proxymanager-server
    environment:
      DB_DSN: "root:${MYSQL_ROOT_PASSWORD:-rootpassword}@tcp(mysql:3306)/proxymanager?parseTime=true"
      FRPS_CONFIG: "/configs/frps.yaml"
    depends_on:
      - mysql
    ports:
      - "8081:8080"
      - "8443:8443"
    volumes:
      - dashboard_dist:/dashboard/dist
    networks:
      - db-net
      - app-net

  frps:
    image: snowdreamtech/frps:v0.68.0
    container_name: proxymanager-frps
    volumes:
      - ../../configs/frps.yaml:/etc/frp/frps.yaml
    ports:
      - "7000:7000"
      - "7500:7500"
    networks:
      - app-net

  nginx:
    image: nginx:alpine
    container_name: proxymanager-nginx
    volumes:
      - ../nginx/conf.d:/etc/nginx/conf.d
      - dashboard_dist:/usr/share/nginx/html
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - server
      - frps
    networks:
      - app-net

networks:
  db-net:
    driver: bridge
    internal: true # Only server can talk to DB
  app-net:
    driver: bridge

volumes:
  mysql_data:
  dashboard_dist:
