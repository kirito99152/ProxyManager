syntax = "proto3";
package api;

option go_package = "github.com/kirito99152/ProxyManager/internal/api";

service AgentService {
  // Agent đăng ký với Server khi khởi chạy lần đầu
  rpc Register(RegisterRequest) returns (RegisterResponse);
  
  // Agent gửi báo cáo định kỳ về tình trạng hệ thống và port
  rpc Heartbeat(ReportRequest) returns (ReportResponse);

  // Agent gửi log hệ thống về Server
  rpc ForwardLog(LogEntry) returns (LogResponse);

  // Server gửi lệnh điều khiển tới Agent
  rpc CommandStream(AgentID) returns (stream Command);
}

message RegisterRequest {
  string hostname = 1;
  string os = 2;
  string private_ip = 3;
}

message RegisterResponse {
  string agent_id = 1;
  string frpc_config_template = 2;
  string frp_server_addr = 3;
  string frp_server_port = 4;
  string frp_token = 5;
}

message ReportRequest {
  string agent_id = 1;
  HardwareStats hardware = 2;
  repeated PortInfo open_ports = 3;
  repeated ServiceInfo services = 4; // Milestone #3: Systemd services
}

message ReportResponse {
  bool success = 1;
  string message = 2;
}

message HardwareStats {
  double cpu_usage = 1;
  uint64 ram_total = 2;
  uint64 ram_used = 3;
  uint64 disk_free = 4;
  uint64 net_in = 5;
  uint64 net_out = 6;
}

message ServiceInfo {
  string name = 1;
  string status = 2; // running, stopped, unknown
}

message PortInfo {
  int32 port = 1;
  string protocol = 2;
  string service_name = 3;
}

message LogEntry {
  string agent_id = 1;
  string timestamp = 2;
  string log_level = 3; // INFO, WARN, ERROR
  string source = 4;    // e.g., auth.log, frpc.log
  string message = 5;
}

message LogResponse {
  bool success = 1;
}

message AgentID {
  string agent_id = 1;
}

message Command {
  string action = 1; // "RELOAD_FRPC", "UPGRADE_AGENT", "RESTART_AGENT", "REMOTE_EXEC"
  string payload = 2; // config hoặc script shell
}
